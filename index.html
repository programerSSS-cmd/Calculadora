<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <link rel="stylesheet" href="./css/style.css">

    </head>
    <body>

        <div class="calculator">
            <div class="result">0</div>
            <div class="buttons">

                <button class="bg-gray">C</button>
                <button class="bg-gray">π</button>
                <button class="bg-gray">%</button>
                <button class="bg-orange">/</button>
                
                <button class="bg-light-gray" value="7"> 7 </button>
                <button class="bg-light-gray" value="8"> 8 </button>
                <button class="bg-light-gray" value="9"> 9 </button>
                <button class="bg-orange"> x </button>

                <button class="bg-light-gray" value="4"> 4 </button>
                <button class="bg-light-gray" value="5"> 5 </button>
                <button class="bg-light-gray" value="6"> 6 </button>
                <button class="bg-orange"> - </button>

                <button class="bg-light-gray" value="1"> 1 </button>
                <button class="bg-light-gray" value="2"> 2 </button>
                <button class="bg-light-gray" value="3"> 3 </button>
                <button class="bg-orange"> + </button>

                <button class="bg-light-gray button-zero" value="0"> 0 </button>
                <button class="bg-light-gray" value=","> , </button>
                <button class="bg-orange"> = </button>

            </div>

        </div>

    </body>

    <script src="./js/script.js"></script>
</html>
