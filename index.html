<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    
    <div class="calculadora">
        <div class="resultado">Resultado</div>

        <button type="button" id="n7"> 7 </button>
        <button type="button" id="n8"> 8 </button>
        <button type="button" id="n9"> 9 </button>
        <button type="button" id="mult"> x </button>

        <button type="button" id="n4"> 4 </button>
        <button type="button" id="n5"> 5 </button>
        <button type="button" id="n6"> 6 </button>
        <button type="button" id="sub"> - </button>



        <button type="button" id="n1"> 1 </button>
        <button type="button" id="n2"> 2 </button>
        <button type="button" id="n3"> 3 </button>
        <button type="button" id="som"> + </button>
   
        
        <button type="button" id="zero"> 0 </button>
        <button type="button" id="div"> / </button>
        <button type="button" id="i"> = </button>


    </div>



</body>

<script src="./js/script.js"></script>
</html>
